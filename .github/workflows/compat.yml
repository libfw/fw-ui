name: compat

# Cross-implementation check: build the real socket_vmnet control plane (C) and
# drive it with this repo's Go client. Runs on macOS (control.c uses libdispatch
# and the daemon is macOS-only). The data path (vmnet) is not involved — only
# the control socket — so neither root nor vmnet entitlements are needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  compat:
    runs-on: macos-latest
    steps:
      - name: Checkout fw-ui
        uses: actions/checkout@v4

      - name: Checkout socket_vmnet (+ c-fw / c-hcl submodules)
        uses: actions/checkout@v4
        with:
          repository: tannevaled/socket_vmnet
          ref: feature/integrate-libfw
          submodules: recursive
          path: socket_vmnet

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build the C control harness
        run: make -C socket_vmnet control-harness

      - name: Compat test (Go client vs real C control plane)
        run: |
          FWUI_HARNESS="$PWD/socket_vmnet/test/control_harness" \
            go test -tags=compat -v ./internal/fwui -run Compat
